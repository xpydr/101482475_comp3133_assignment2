<div class="flex min-h-dvh flex-col bg-slate-50">
  <header class="border-b border-slate-200 bg-white shadow-sm">
    <div class="mx-auto flex max-w-6xl flex-wrap items-center justify-between gap-4 px-4 py-3">
      <a routerLink="/" class="text-lg font-semibold text-slate-900">{{ title }}</a>
      <nav class="flex flex-wrap items-center gap-1 text-sm">
        @if (auth.isLoggedIn()) {
          <a
            routerLink="/employees"
            routerLinkActive="bg-indigo-50 text-indigo-700"
            [routerLinkActiveOptions]="{ exact: true }"
            class="rounded-lg px-3 py-2 text-slate-700 hover:bg-slate-100"
          >
            Employees
          </a>
          <a
            routerLink="/employees/new"
            routerLinkActive="bg-indigo-50 text-indigo-700"
            class="rounded-lg px-3 py-2 text-slate-700 hover:bg-slate-100"
          >
            Add
          </a>
          <a
            routerLink="/employees/search"
            routerLinkActive="bg-indigo-50 text-indigo-700"
            class="rounded-lg px-3 py-2 text-slate-700 hover:bg-slate-100"
          >
            Search
          </a>
          <button
            type="button"
            (click)="auth.logout()"
            class="ml-2 rounded-lg border border-slate-300 px-3 py-2 text-slate-700 hover:bg-slate-50"
          >
            Log out
          </button>
        } @else {
          <a
            routerLink="/login"
            routerLinkActive="bg-indigo-50 text-indigo-700"
            class="rounded-lg px-3 py-2 text-slate-700 hover:bg-slate-100"
          >
            Sign in
          </a>
          <a
            routerLink="/signup"
            routerLinkActive="bg-indigo-50 text-indigo-700"
            class="rounded-lg px-3 py-2 text-slate-700 hover:bg-slate-100"
          >
            Sign up
          </a>
        }
      </nav>
    </div>
  </header>
  <main class="flex-1">
    <router-outlet />
  </main>
</div>
