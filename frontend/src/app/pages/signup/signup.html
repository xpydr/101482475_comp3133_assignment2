<div class="mx-auto flex min-h-[60vh] max-w-md flex-col justify-center px-4 py-12">
  <h1 class="mb-2 text-2xl font-semibold text-slate-900">Create account</h1>
  <p class="mb-6 text-sm text-slate-600">
    Already have an account?
    <a routerLink="/login" class="text-indigo-600 hover:underline">Sign in</a>
  </p>

  @if (error()) {
    <p class="mb-4 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-red-800">{{ error() }}</p>
  }

  <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4 rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
    <label class="block">
      <span class="mb-1 block text-sm font-medium text-slate-700">Username</span>
      <input
        type="text"
        formControlName="username"
        autocomplete="username"
        class="w-full rounded-lg border border-slate-300 px-3 py-2 text-slate-900 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500"
      />
    </label>
    <label class="block">
      <span class="mb-1 block text-sm font-medium text-slate-700">Email</span>
      <input
        type="email"
        formControlName="email"
        autocomplete="email"
        class="w-full rounded-lg border border-slate-300 px-3 py-2 text-slate-900 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500"
      />
    </label>
    <label class="block">
      <span class="mb-1 block text-sm font-medium text-slate-700">Password (min 6 characters)</span>
      <input
        type="password"
        formControlName="password"
        autocomplete="new-password"
        class="w-full rounded-lg border border-slate-300 px-3 py-2 text-slate-900 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500"
      />
    </label>
    <button
      type="submit"
      [disabled]="submitting()"
      class="w-full rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-indigo-500 disabled:opacity-50"
    >
      {{ submitting() ? 'Creating…' : 'Sign up' }}
    </button>
  </form>
</div>
